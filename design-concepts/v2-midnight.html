<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde — Midnight</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--surface:#0f1525;--panel:#121a30;
  --b1:rgba(180,170,140,.08);--b2:rgba(180,170,140,.15);--b3:rgba(180,170,140,.25);
  --gold:#c9a84c;--gold-20:rgba(201,168,76,.2);--gold-08:rgba(201,168,76,.08);
  --t1:#e8e4d8;--t2:rgba(232,228,216,.55);--t3:rgba(232,228,216,.25);--t4:rgba(232,228,216,.12);
  --teal:#5cc9b5;--teal-15:rgba(92,201,181,.15);
  --rose:#d4726c;--rose-15:rgba(212,114,108,.15);
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Fira Code',monospace;
}
body{background:var(--bg);color:var(--t1);font-family:var(--serif);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* Subtle noise overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.02;mix-blend-mode:overlay;
}

/* ── Top ── */
.top{
  height:52px;display:flex;align-items:center;padding:0 32px;
  border-bottom:1px solid var(--b1);flex-shrink:0;
}
.logo{font-size:22px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.top-sep{width:1px;height:20px;background:var(--b2);margin:0 20px}
.top-status{font-family:var(--mono);font-size:11px;color:var(--t2);display:flex;align-items:center;gap:8px}
.top-status .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.4);animation:glow 2s ease-in-out infinite}
@keyframes glow{50%{box-shadow:0 0 4px rgba(201,168,76,.15)}}
.sp{flex:1}
.btn{font-family:var(--serif);font-size:13px;font-weight:500;letter-spacing:.06em;padding:6px 18px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;transition:.15s;text-transform:uppercase}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.btn-gold:hover{background:var(--gold-08)}

/* ── Lanes ── */
.lanes{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Lane ── */
.lane{flex:1;display:flex;border-bottom:1px solid var(--b1);min-height:0;position:relative}

.lane-panel{
  width:240px;flex-shrink:0;padding:24px 28px;
  display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid var(--b1);
  background:var(--panel);
}
.lane-url{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:.02em}
.lane-hero{font-size:60px;font-weight:300;letter-spacing:-.04em;line-height:.85;margin-top:6px}
.lane-hero .unit{font-size:18px;font-weight:400;color:var(--t3);margin-left:2px}
.lane-sub{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:6px;letter-spacing:.04em;text-transform:uppercase}
.lane-stats{display:flex;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid var(--b1)}
.ls-label{font-family:var(--mono);font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.06em}
.ls-val{font-family:var(--mono);font-size:14px;color:var(--t2);margin-top:2px}

.lane-chart{flex:1;position:relative;overflow:hidden;background:var(--surface)}
.lane-chart svg{width:100%;height:100%;display:block}
.lane-y{position:absolute;right:14px;font-family:var(--mono);font-size:10px;color:var(--t3);pointer-events:none}
.lane-y.t{top:10px}.lane-y.m{top:50%;transform:translateY(-50%)}.lane-y.b{bottom:10px}

/* ── X axis ── */
.x-bar{height:28px;display:flex;align-items:center;border-top:1px solid var(--b1);flex-shrink:0;background:var(--panel)}
.x-spacer{width:240px;border-right:1px solid var(--b1);height:100%;display:flex;align-items:center;padding:0 28px}
.x-spacer span{font-family:var(--serif);font-size:11px;color:var(--t3);font-style:italic;letter-spacing:.04em}
.x-labels{flex:1;display:flex;justify-content:space-between;padding:0 16px;font-family:var(--mono);font-size:10px;color:var(--t3)}

/* ── Footer ── */
.foot{height:28px;display:flex;align-items:center;padding:0 32px;border-top:1px solid var(--b1);font-family:var(--mono);font-size:10px;color:var(--t3);gap:20px;flex-shrink:0}
.foot .sp{flex:1}
.foot .gold{color:var(--gold)}

/* SVG */
.g{stroke:var(--b1);stroke-width:.5}
.thr{stroke:var(--gold);stroke-width:1;stroke-dasharray:8 6;opacity:.2}
.thr-label{font-family:var(--mono);font-size:10px;fill:var(--gold);opacity:.35}
.ribbon{opacity:1}
.med{fill:none;stroke-width:1.5;stroke-dasharray:6 5;opacity:.4}
.ln{fill:none;stroke-width:1.5;opacity:.35}
.pt{r:3;opacity:.85;cursor:pointer;transition:r .08s}
.pt:hover{r:5;opacity:1}
.future{fill:rgba(255,255,255,.015)}

/* Hover line */
.xline{position:absolute;top:52px;bottom:56px;width:1px;background:var(--gold);pointer-events:none;z-index:5;opacity:0;transition:opacity .06s}
.xline.v{opacity:.3}
</style>
</head>
<body>

<div class="top">
  <div class="logo">Sonde</div>
  <div class="top-sep"></div>
  <div class="top-status"><div class="dot"></div> Running — Round 24 of 30</div>
  <div class="sp"></div>
  <button class="btn">+ Endpoint</button>
  <button class="btn">Share</button>
  <button class="btn btn-gold">Stop</button>
</div>

<div class="lanes" id="lanes">
  <div class="lane">
    <div class="lane-panel">
      <div class="lane-url">www.google.com</div>
      <div class="lane-hero" style="color:var(--teal)">38<span class="unit">ms</span></div>
      <div class="lane-sub">P50 Median</div>
      <div class="lane-stats">
        <div><div class="ls-label">P95</div><div class="ls-val">52ms</div></div>
        <div><div class="ls-label">P99</div><div class="ls-val">98ms</div></div>
        <div><div class="ls-label">Jitter</div><div class="ls-val">4.2ms</div></div>
        <div><div class="ls-label">Loss</div><div class="ls-val">0%</div></div>
      </div>
    </div>
    <div class="lane-chart">
      <div class="lane-y t">52ms</div><div class="lane-y m">38ms</div><div class="lane-y b">28ms</div>
      <svg viewBox="0 0 1000 200" preserveAspectRatio="none">
        <line class="g" x1="0" y1="50" x2="1000" y2="50"/><line class="g" x1="0" y1="100" x2="1000" y2="100"/><line class="g" x1="0" y1="150" x2="1000" y2="150"/>
        <rect class="future" x="800" y="0" width="200" height="200"/>
        <path class="ribbon" fill="var(--teal-15)" d="M433,88 L467,84 L500,92 L533,82 L567,90 L600,80 L633,86 L667,78 L700,84 L733,80 L767,86 L767,126 L733,130 L700,132 L667,128 L633,134 L600,130 L567,136 L533,132 L500,128 L467,124 L433,128 Z"/>
        <path class="med" stroke="var(--teal)" d="M433,108 L467,104 L500,110 L533,104 L567,112 L600,106 L633,110 L667,102 L700,108 L733,106 L767,108"/>
        <path class="ln" stroke="var(--teal)" d="M0,110 L33,118 L67,102 L100,110 L133,122 L167,98 L200,106 L233,126 L267,104 L300,114 L333,94 L367,110 L400,102 L433,120 L467,106 L500,100 L533,116 L567,94 L600,108 L633,102 L667,104 L700,98 L733,104 L767,108 L800,110"/>
        <g fill="var(--teal)"><circle class="pt" cx="0" cy="110"/><circle class="pt" cx="33" cy="118"/><circle class="pt" cx="67" cy="102"/><circle class="pt" cx="100" cy="110"/><circle class="pt" cx="133" cy="122"/><circle class="pt" cx="167" cy="98"/><circle class="pt" cx="200" cy="106"/><circle class="pt" cx="233" cy="126"/><circle class="pt" cx="267" cy="104"/><circle class="pt" cx="300" cy="114"/><circle class="pt" cx="333" cy="94"/><circle class="pt" cx="367" cy="110"/><circle class="pt" cx="400" cy="102"/><circle class="pt" cx="433" cy="120"/><circle class="pt" cx="467" cy="106"/><circle class="pt" cx="500" cy="100"/><circle class="pt" cx="533" cy="116"/><circle class="pt" cx="567" cy="94"/><circle class="pt" cx="600" cy="108"/><circle class="pt" cx="633" cy="102"/><circle class="pt" cx="667" cy="104"/><circle class="pt" cx="700" cy="98"/><circle class="pt" cx="733" cy="104"/><circle class="pt" cx="767" cy="108"/></g>
        <circle cx="800" cy="110" r="4" fill="var(--teal)" stroke="var(--surface)" stroke-width="2"/>
      </svg>
    </div>
  </div>

  <div class="lane">
    <div class="lane-panel">
      <div class="lane-url">1.1.1.1</div>
      <div class="lane-hero" style="color:var(--rose)">94<span class="unit">ms</span></div>
      <div class="lane-sub">P50 Median</div>
      <div class="lane-stats">
        <div><div class="ls-label">P95</div><div class="ls-val">128ms</div></div>
        <div><div class="ls-label">P99</div><div class="ls-val">167ms</div></div>
        <div><div class="ls-label">Jitter</div><div class="ls-val">6.1ms</div></div>
        <div><div class="ls-label">Loss</div><div class="ls-val">0%</div></div>
      </div>
    </div>
    <div class="lane-chart">
      <div class="lane-y t">142ms</div><div class="lane-y m">94ms</div><div class="lane-y b">78ms</div>
      <svg viewBox="0 0 1000 200" preserveAspectRatio="none">
        <line class="g" x1="0" y1="50" x2="1000" y2="50"/><line class="g" x1="0" y1="100" x2="1000" y2="100"/><line class="g" x1="0" y1="150" x2="1000" y2="150"/>
        <line class="thr" x1="0" y1="70" x2="800" y2="70"/><text class="thr-label" x="6" y="65">100ms</text>
        <rect class="future" x="800" y="0" width="200" height="200"/>
        <path class="ribbon" fill="var(--rose-15)" d="M433,36 L467,44 L500,30 L533,42 L567,24 L600,48 L633,32 L667,38 L700,28 L733,36 L767,26 L767,120 L733,126 L700,128 L667,122 L633,130 L600,124 L567,128 L533,122 L500,116 L467,112 L433,118 Z"/>
        <path class="med" stroke="var(--rose)" d="M433,78 L467,82 L500,74 L533,78 L567,70 L600,82 L633,76 L667,78 L700,72 L733,76 L767,68"/>
        <path class="ln" stroke="var(--rose)" d="M0,82 L33,66 L67,98 L100,50 L133,78 L167,106 L200,70 L233,58 L267,86 L300,74 L333,62 L367,90 L400,26 L433,78 L467,66 L500,82 L533,58 L567,70 L600,86 L633,58 L667,74 L700,82 L733,50 L767,66 L800,70"/>
        <g fill="var(--rose)"><circle class="pt" cx="0" cy="82"/><circle class="pt" cx="33" cy="66"/><circle class="pt" cx="67" cy="98"/><circle class="pt" cx="100" cy="50"/><circle class="pt" cx="133" cy="78"/><circle class="pt" cx="167" cy="106"/><circle class="pt" cx="200" cy="70"/><circle class="pt" cx="233" cy="58"/><circle class="pt" cx="267" cy="86"/><circle class="pt" cx="300" cy="74"/><circle class="pt" cx="333" cy="62"/><circle class="pt" cx="367" cy="90"/><circle class="pt" cx="400" cy="26"/><circle class="pt" cx="433" cy="78"/><circle class="pt" cx="467" cy="66"/><circle class="pt" cx="500" cy="82"/><circle class="pt" cx="533" cy="58"/><circle class="pt" cx="567" cy="70"/><circle class="pt" cx="600" cy="86"/><circle class="pt" cx="633" cy="58"/><circle class="pt" cx="667" cy="74"/><circle class="pt" cx="700" cy="82"/><circle class="pt" cx="733" cy="50"/><circle class="pt" cx="767" cy="66"/></g>
        <circle cx="800" cy="70" r="4" fill="var(--rose)" stroke="var(--surface)" stroke-width="2"/>
      </svg>
    </div>
  </div>
</div>

<div class="x-bar">
  <div class="x-spacer"><span>Round</span></div>
  <div class="x-labels"><span>1</span><span>5</span><span>10</span><span>15</span><span>20</span><span>24</span><span style="opacity:.3">30</span></div>
</div>

<div class="foot">
  <span>Measuring from your browser</span>
  <span>1s interval · 5s timeout</span>
  <div class="sp"></div>
  <span class="gold">24 of 30</span>
  <span>0 errors · 0 timeouts</span>
</div>

<div class="xline" id="xline"></div>
<script>
var lanes=document.getElementById('lanes'),xl=document.getElementById('xline');
lanes.addEventListener('mousemove',function(e){var r=lanes.getBoundingClientRect();if(e.clientX-r.left<240){xl.classList.remove('v');return}xl.style.left=e.clientX+'px';xl.classList.add('v')});
lanes.addEventListener('mouseleave',function(){xl.classList.remove('v')});
</script>
</body>
</html>
