<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde — Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Martian+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-from:#0f0f1a;--bg-to:#1a0f2e;
  --glass:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.08);--glass-hover:rgba(255,255,255,.06);
  --frost:rgba(255,255,255,.02);
  --t1:rgba(255,255,255,.92);--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.28);--t4:rgba(255,255,255,.12);
  --cyan:#67e8f9;--cyan-20:rgba(103,232,249,.2);--cyan-10:rgba(103,232,249,.1);--cyan-05:rgba(103,232,249,.05);
  --pink:#f9a8d4;--pink-20:rgba(249,168,212,.2);--pink-10:rgba(249,168,212,.1);--pink-05:rgba(249,168,212,.05);
  --green:#86efac;
  --sans:'Sora',system-ui,sans-serif;
  --mono:'Martian Mono',monospace;
}
body{
  background:linear-gradient(145deg,var(--bg-from),var(--bg-to));
  color:var(--t1);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
}

/* Ambient light blobs */
body::before,body::after{
  content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px);
}
body::before{width:500px;height:500px;top:-100px;right:-100px;background:rgba(103,232,249,.06)}
body::after{width:400px;height:400px;bottom:-80px;left:-80px;background:rgba(249,168,212,.05)}

/* Everything on top of blobs */
.top,.lanes,.x-bar,.foot{position:relative;z-index:1}

/* ── Top ── */
.top{
  height:52px;display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
}
.logo{font-weight:700;font-size:16px;letter-spacing:-.02em}
.top-sep{width:1px;height:16px;background:var(--glass-border)}
.run{font-family:var(--mono);font-size:11px;color:var(--t2);display:flex;align-items:center;gap:7px}
.run .d{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(134,239,172,.4);animation:p 1.5s ease-in-out infinite}
@keyframes p{50%{opacity:.3}}
.sp{flex:1}
.btn{
  font-family:var(--sans);font-size:11px;font-weight:500;padding:6px 14px;
  border-radius:10px;border:1px solid var(--glass-border);
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:var(--t2);cursor:pointer;transition:.15s;
}
.btn:hover{background:var(--glass-hover);border-color:rgba(255,255,255,.15);color:var(--t1)}
.btn-accent{border-color:rgba(249,168,212,.3);color:var(--pink)}
.btn-accent:hover{background:rgba(249,168,212,.06)}

/* ── Lanes ── */
.lanes{flex:1;display:flex;flex-direction:column;padding:8px;gap:8px;overflow:hidden}

/* ── Lane ── */
.lane{
  flex:1;display:flex;min-height:0;position:relative;overflow:hidden;
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:16px;
}

.lane-panel{
  width:240px;flex-shrink:0;padding:24px 28px;
  display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid var(--glass-border);
}
.lane-url{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.02em}
.lane-hero{font-size:52px;font-weight:300;letter-spacing:-.05em;line-height:.85;margin-top:8px}
.lane-hero .u{font-size:15px;font-weight:400;color:var(--t3);margin-left:2px}
.lane-sub{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:5px;text-transform:uppercase;letter-spacing:.05em}
.lane-stats{display:flex;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid var(--glass-border)}
.ls-l{font-family:var(--mono);font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.06em}
.ls-v{font-family:var(--mono);font-size:14px;color:var(--t2);margin-top:2px}

.lane-chart{flex:1;position:relative;overflow:hidden}
.lane-chart svg{width:100%;height:100%;display:block}
.lane-y{position:absolute;right:14px;font-family:var(--mono);font-size:10px;color:var(--t3);pointer-events:none}
.lane-y.t{top:10px}.lane-y.m{top:50%;transform:translateY(-50%)}.lane-y.b{bottom:10px}

/* X */
.x-bar{
  height:32px;display:flex;align-items:center;padding:0 8px;flex-shrink:0;
}
.x-sp{width:240px;padding:0 28px}
.x-sp span{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.x-labels{flex:1;display:flex;justify-content:space-between;padding:0 16px;font-family:var(--mono);font-size:10px;color:var(--t3)}

/* Footer */
.foot{
  height:36px;display:flex;align-items:center;padding:0 24px;
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--glass-border);
  font-family:var(--mono);font-size:10px;color:var(--t3);gap:16px;flex-shrink:0;
}
.foot .sp{flex:1}

/* SVG */
.g{stroke:var(--glass-border);stroke-width:.5}
.thr{stroke:var(--pink);stroke-width:1;stroke-dasharray:6 4;opacity:.15}
.thr-label{font-family:var(--mono);font-size:10px;fill:var(--pink);opacity:.3}
.ribbon{opacity:1}
.med{fill:none;stroke-width:1.5;stroke-dasharray:5 4;opacity:.4}
.ln{fill:none;stroke-width:1.5;opacity:.3}
.pt{r:3;opacity:.85;cursor:pointer;transition:r .08s}
.pt:hover{r:5;opacity:1}
.future{fill:rgba(255,255,255,.01)}

.xline{position:absolute;top:60px;bottom:68px;width:1px;background:rgba(255,255,255,.15);pointer-events:none;z-index:5;opacity:0;transition:opacity .06s}
.xline.v{opacity:1}
</style>
</head>
<body>

<div class="top">
  <div class="logo">Sonde</div>
  <div class="top-sep"></div>
  <div class="run"><div class="d"></div>Running · Round 24 of 30</div>
  <div class="sp"></div>
  <button class="btn">+ Endpoint</button>
  <button class="btn">Share</button>
  <button class="btn btn-accent">Stop</button>
</div>

<div class="lanes" id="lanes">
  <div class="lane">
    <div class="lane-panel">
      <div class="lane-url">www.google.com</div>
      <div class="lane-hero" style="color:var(--cyan)">38<span class="u">ms</span></div>
      <div class="lane-sub">P50 Median</div>
      <div class="lane-stats">
        <div><div class="ls-l">P95</div><div class="ls-v">52ms</div></div>
        <div><div class="ls-l">P99</div><div class="ls-v">98ms</div></div>
        <div><div class="ls-l">Jitter</div><div class="ls-v">4.2ms</div></div>
        <div><div class="ls-l">Loss</div><div class="ls-v">0%</div></div>
      </div>
    </div>
    <div class="lane-chart">
      <div class="lane-y t">52ms</div><div class="lane-y m">38ms</div><div class="lane-y b">28ms</div>
      <svg viewBox="0 0 1000 200" preserveAspectRatio="none">
        <line class="g" x1="0" y1="50" x2="1000" y2="50"/><line class="g" x1="0" y1="100" x2="1000" y2="100"/><line class="g" x1="0" y1="150" x2="1000" y2="150"/>
        <rect class="future" x="800" y="0" width="200" height="200"/>
        <path class="ribbon" fill="var(--cyan-10)" d="M433,88 L467,84 L500,92 L533,82 L567,90 L600,80 L633,86 L667,78 L700,84 L733,80 L767,86 L767,126 L733,130 L700,132 L667,128 L633,134 L600,130 L567,136 L533,132 L500,128 L467,124 L433,128 Z"/>
        <path class="med" stroke="var(--cyan)" d="M433,108 L467,104 L500,110 L533,104 L567,112 L600,106 L633,110 L667,102 L700,108 L733,106 L767,108"/>
        <path class="ln" stroke="var(--cyan)" d="M0,110 L33,118 L67,102 L100,110 L133,122 L167,98 L200,106 L233,126 L267,104 L300,114 L333,94 L367,110 L400,102 L433,120 L467,106 L500,100 L533,116 L567,94 L600,108 L633,102 L667,104 L700,98 L733,104 L767,108 L800,110"/>
        <g fill="var(--cyan)"><circle class="pt" cx="0" cy="110"/><circle class="pt" cx="33" cy="118"/><circle class="pt" cx="67" cy="102"/><circle class="pt" cx="100" cy="110"/><circle class="pt" cx="133" cy="122"/><circle class="pt" cx="167" cy="98"/><circle class="pt" cx="200" cy="106"/><circle class="pt" cx="233" cy="126"/><circle class="pt" cx="267" cy="104"/><circle class="pt" cx="300" cy="114"/><circle class="pt" cx="333" cy="94"/><circle class="pt" cx="367" cy="110"/><circle class="pt" cx="400" cy="102"/><circle class="pt" cx="433" cy="120"/><circle class="pt" cx="467" cy="106"/><circle class="pt" cx="500" cy="100"/><circle class="pt" cx="533" cy="116"/><circle class="pt" cx="567" cy="94"/><circle class="pt" cx="600" cy="108"/><circle class="pt" cx="633" cy="102"/><circle class="pt" cx="667" cy="104"/><circle class="pt" cx="700" cy="98"/><circle class="pt" cx="733" cy="104"/><circle class="pt" cx="767" cy="108"/></g>
        <circle cx="800" cy="110" r="4" fill="var(--cyan)" style="filter:drop-shadow(0 0 8px var(--cyan-20))"/>
      </svg>
    </div>
  </div>

  <div class="lane">
    <div class="lane-panel">
      <div class="lane-url">1.1.1.1</div>
      <div class="lane-hero" style="color:var(--pink)">94<span class="u">ms</span></div>
      <div class="lane-sub">P50 Median</div>
      <div class="lane-stats">
        <div><div class="ls-l">P95</div><div class="ls-v">128ms</div></div>
        <div><div class="ls-l">P99</div><div class="ls-v">167ms</div></div>
        <div><div class="ls-l">Jitter</div><div class="ls-v">6.1ms</div></div>
        <div><div class="ls-l">Loss</div><div class="ls-v">0%</div></div>
      </div>
    </div>
    <div class="lane-chart">
      <div class="lane-y t">142ms</div><div class="lane-y m">94ms</div><div class="lane-y b">78ms</div>
      <svg viewBox="0 0 1000 200" preserveAspectRatio="none">
        <line class="g" x1="0" y1="50" x2="1000" y2="50"/><line class="g" x1="0" y1="100" x2="1000" y2="100"/><line class="g" x1="0" y1="150" x2="1000" y2="150"/>
        <line class="thr" x1="0" y1="70" x2="800" y2="70"/><text class="thr-label" x="6" y="65">100ms</text>
        <rect class="future" x="800" y="0" width="200" height="200"/>
        <path class="ribbon" fill="var(--pink-10)" d="M433,36 L467,44 L500,30 L533,42 L567,24 L600,48 L633,32 L667,38 L700,28 L733,36 L767,26 L767,120 L733,126 L700,128 L667,122 L633,130 L600,124 L567,128 L533,122 L500,116 L467,112 L433,118 Z"/>
        <path class="med" stroke="var(--pink)" d="M433,78 L467,82 L500,74 L533,78 L567,70 L600,82 L633,76 L667,78 L700,72 L733,76 L767,68"/>
        <path class="ln" stroke="var(--pink)" d="M0,82 L33,66 L67,98 L100,50 L133,78 L167,106 L200,70 L233,58 L267,86 L300,74 L333,62 L367,90 L400,26 L433,78 L467,66 L500,82 L533,58 L567,70 L600,86 L633,58 L667,74 L700,82 L733,50 L767,66 L800,70"/>
        <g fill="var(--pink)"><circle class="pt" cx="0" cy="82"/><circle class="pt" cx="33" cy="66"/><circle class="pt" cx="67" cy="98"/><circle class="pt" cx="100" cy="50"/><circle class="pt" cx="133" cy="78"/><circle class="pt" cx="167" cy="106"/><circle class="pt" cx="200" cy="70"/><circle class="pt" cx="233" cy="58"/><circle class="pt" cx="267" cy="86"/><circle class="pt" cx="300" cy="74"/><circle class="pt" cx="333" cy="62"/><circle class="pt" cx="367" cy="90"/><circle class="pt" cx="400" cy="26"/><circle class="pt" cx="433" cy="78"/><circle class="pt" cx="467" cy="66"/><circle class="pt" cx="500" cy="82"/><circle class="pt" cx="533" cy="58"/><circle class="pt" cx="567" cy="70"/><circle class="pt" cx="600" cy="86"/><circle class="pt" cx="633" cy="58"/><circle class="pt" cx="667" cy="74"/><circle class="pt" cx="700" cy="82"/><circle class="pt" cx="733" cy="50"/><circle class="pt" cx="767" cy="66"/></g>
        <circle cx="800" cy="70" r="4" fill="var(--pink)" style="filter:drop-shadow(0 0 8px var(--pink-20))"/>
      </svg>
    </div>
  </div>
</div>

<div class="x-bar">
  <div class="x-sp"><span>Round</span></div>
  <div class="x-labels"><span>1</span><span>5</span><span>10</span><span>15</span><span>20</span><span>24</span><span style="opacity:.3">30</span></div>
</div>

<div class="foot">
  Measuring from your browser
  <div class="sp"></div>
  1s interval · 5s timeout · 24 of 30 · 0 errors
</div>

<div class="xline" id="xline"></div>
<script>
var lanes=document.getElementById('lanes'),xl=document.getElementById('xline');
lanes.addEventListener('mousemove',function(e){var r=lanes.getBoundingClientRect();if(e.clientX-r.left<248){xl.classList.remove('v');return}xl.style.left=e.clientX+'px';xl.classList.add('v')});
lanes.addEventListener('mouseleave',function(){xl.classList.remove('v')});
</script>
</body>
</html>
