<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde Concept C — Precision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111214;
    --bg-card: #18191c;
    --bg-surface: #1e2023;
    --border: rgba(255,255,255,0.07);
    --border-focus: rgba(255,255,255,0.15);
    --text-1: rgba(255,255,255,0.93);
    --text-2: rgba(255,255,255,0.52);
    --text-3: rgba(255,255,255,0.25);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --rose: #fb7185;
    --rose-dim: rgba(251,113,133,0.12);
    --green: #4ade80;
    --amber: #fbbf24;
    --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font-sans);
    min-height: 100vh;
  }

  /* ── Top bar ────────────────────────────────────────────────────── */
  .topbar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: -0.01em;
  }
  .brand-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--text-3);
    margin-left: 6px;
  }
  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-2);
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.15);
  }
  .status-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-1);
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn:hover { background: rgba(255,255,255,0.04); border-color: var(--border-focus); }
  .btn-stop {
    background: rgba(251,113,133,0.1);
    border-color: rgba(251,113,133,0.25);
    color: var(--rose);
  }
  .btn-stop:hover { background: rgba(251,113,133,0.18); }

  /* ── Layout ─────────────────────────────────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
    height: calc(100vh - 48px);
    gap: 1px;
    background: var(--border);
  }

  /* ── Endpoint Bar ───────────────────────────────────────────────── */
  .endpoint-bar {
    display: flex;
    align-items: stretch;
    background: var(--bg-card);
  }
  .ep-item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border-right: 1px solid var(--border);
    transition: background 0.12s;
  }
  .ep-item:last-of-type { border-right: none; }
  .ep-item:hover { background: rgba(255,255,255,0.02); }
  .ep-color {
    width: 3px;
    height: 36px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .ep-info { flex: 1; }
  .ep-url {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    color: var(--text-2);
  }
  .ep-value {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 300;
    color: var(--text-1);
    line-height: 1.1;
    margin-top: 2px;
    letter-spacing: -0.02em;
  }
  .ep-value .ms { font-size: 12px; color: var(--text-3); font-weight: 400; }
  .ep-stats {
    display: flex;
    gap: 16px;
    margin-left: auto;
  }
  .ep-stat {
    text-align: right;
  }
  .ep-stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .ep-stat-val {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 400;
    color: var(--text-2);
  }
  .ep-add {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 48px;
    max-width: 48px;
    font-size: 18px;
    color: var(--text-3);
    cursor: pointer;
    transition: color 0.12s;
    border-right: none;
  }
  .ep-add:hover { color: var(--text-2); }

  /* ── Chart ──────────────────────────────────────────────────────── */
  .chart-container {
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  /* Y-axis */
  .y-col {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 32px;
    width: 54px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8px 0;
    pointer-events: none;
  }
  .y-tick {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    text-align: right;
    padding-right: 8px;
    line-height: 1;
  }

  /* Scale badge */
  .scale-badge {
    position: absolute;
    top: 8px;
    left: 58px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-3);
    padding: 2px 6px;
    background: var(--bg-surface);
    border-radius: 3px;
    pointer-events: none;
  }

  /* Legend */
  .chart-legend {
    position: absolute;
    top: 8px;
    right: 12px;
    display: flex;
    gap: 14px;
    pointer-events: none;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-3);
  }
  .leg-band {
    width: 14px;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
  }
  .leg-median {
    width: 14px;
    border-top: 1.5px dashed rgba(255,255,255,0.3);
  }

  /* SVG area */
  .svg-area {
    position: absolute;
    top: 0;
    left: 54px;
    right: 0;
    bottom: 32px;
  }
  .svg-area svg {
    width: 100%;
    height: 100%;
  }

  .g-line {
    stroke: var(--border);
    stroke-width: 0.5;
  }
  .x-line {
    stroke: rgba(255,255,255,0.1);
    stroke-width: 1;
  }
  .band { opacity: 0.1; }
  .med {
    fill: none;
    stroke-width: 1.5;
    stroke-dasharray: 4 4;
    opacity: 0.4;
  }
  .dot {
    r: 3;
    opacity: 0.88;
    cursor: pointer;
    transition: r 0.08s ease;
  }
  .dot:hover { r: 5; opacity: 1; }

  /* X-axis */
  .x-row {
    position: absolute;
    bottom: 8px;
    left: 54px;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
    pointer-events: none;
  }
  .x-tick {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
  }

  /* Tooltip */
  .tt {
    position: absolute;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.08s;
    transform: translateX(-50%) translateY(-100%);
    margin-top: -14px;
  }
  .tt.show { opacity: 1; }
  .tt-body {
    background: var(--bg-surface);
    border: 1px solid var(--border-focus);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tt-color {
    width: 3px;
    height: 28px;
    border-radius: 2px;
  }
  .tt-data {}
  .tt-endpoint { font-size: 10px; color: var(--text-2); }
  .tt-latency { font-size: 16px; font-weight: 300; color: var(--text-1); margin: 1px 0; }
  .tt-round { font-size: 10px; color: var(--text-3); }

  /* ── Bottom stats ───────────────────────────────────────────────── */
  .bottom-stats {
    display: flex;
    background: var(--bg-card);
  }
  .bs-section {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 20px;
    border-right: 1px solid var(--border);
  }
  .bs-section:last-child { border-right: none; }
  .bs-color {
    width: 3px;
    height: 28px;
    border-radius: 2px;
  }
  .bs-name {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-2);
    min-width: 100px;
  }
  .bs-metrics {
    display: flex;
    gap: 20px;
    flex: 1;
  }
  .bs-m {
    text-align: center;
    flex: 1;
  }
  .bs-m-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }
  .bs-m-val {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 300;
    color: var(--text-1);
  }
  .bs-m-val .u { font-size: 10px; color: var(--text-3); }

  /* ── Empty State ────────────────────────────────────────────────── */
  .empty {
    position: absolute;
    inset: 0 0 32px 54px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .empty-grid {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        90deg,
        var(--border) 0 0.5px,
        transparent 0.5px 100%
      ),
      repeating-linear-gradient(
        0deg,
        var(--border) 0 0.5px,
        transparent 0.5px 100%
      );
    background-size: calc(100% / 10) calc(100% / 6);
    opacity: 0.3;
  }
  .empty-msg {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 16px 28px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    background: rgba(17,18,20,0.85);
  }
  .empty-msg h3 {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 400;
    color: var(--text-2);
    margin-bottom: 4px;
  }
  .empty-msg p {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-3);
  }
  .empty-msg kbd {
    display: inline-block;
    padding: 1px 5px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-2);
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════════
     CONCEPT C: PRECISION

     Design philosophy: Grafana done right.
     Dense, utilitarian, information-first.

     - IBM Plex type system (designed for data interfaces)
     - Every row and column is load-bearing — no wasted space
     - Thin color bars replace dots for endpoint identification
     - Numbers dominate: big P50 readout, stats everywhere
     - 1px borders structure without decorating
     - Dark but not "moody" — functional, like a lab instrument
     - Empty state: measurement grid + dashed-border prompt
     ════════════════════════════════════════════════════════════════════ -->

<div class="topbar">
  <div class="topbar-left">
    <div class="brand">Sonde<span class="brand-tag">v2.0</span></div>
    <div class="divider"></div>
    <div class="status-pill">
      <span class="dot"></span>
      <span>Running · R24/30</span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn">Share</button>
    <button class="btn">Settings</button>
    <button class="btn btn-stop">Stop</button>
  </div>
</div>

<div class="layout">
  <!-- Endpoint Bar -->
  <div class="endpoint-bar">
    <div class="ep-item">
      <div class="ep-color" style="background: var(--blue)"></div>
      <div class="ep-info">
        <div class="ep-url">www.google.com</div>
        <div class="ep-value">38<span class="ms">ms</span></div>
      </div>
      <div class="ep-stats">
        <div class="ep-stat">
          <div class="ep-stat-label">P95</div>
          <div class="ep-stat-val">52ms</div>
        </div>
        <div class="ep-stat">
          <div class="ep-stat-label">Jitter</div>
          <div class="ep-stat-val">4.2ms</div>
        </div>
      </div>
    </div>
    <div class="ep-item">
      <div class="ep-color" style="background: var(--rose)"></div>
      <div class="ep-info">
        <div class="ep-url">1.1.1.1</div>
        <div class="ep-value">94<span class="ms">ms</span></div>
      </div>
      <div class="ep-stats">
        <div class="ep-stat">
          <div class="ep-stat-label">P95</div>
          <div class="ep-stat-val">128ms</div>
        </div>
        <div class="ep-stat">
          <div class="ep-stat-label">Jitter</div>
          <div class="ep-stat-val">6.1ms</div>
        </div>
      </div>
    </div>
    <div class="ep-item ep-add">+</div>
  </div>

  <!-- Chart -->
  <div class="chart-container" id="chart">
    <div class="y-col">
      <div class="y-tick">150ms</div>
      <div class="y-tick">120ms</div>
      <div class="y-tick">90ms</div>
      <div class="y-tick">60ms</div>
      <div class="y-tick">30ms</div>
      <div class="y-tick">0ms</div>
    </div>

    <div class="scale-badge">LINEAR</div>

    <div class="chart-legend">
      <div class="leg-item"><div class="leg-band"></div><span>P25–P75</span></div>
      <div class="leg-item"><div class="leg-median"></div><span>P50</span></div>
    </div>

    <div class="svg-area">
      <svg viewBox="0 0 800 400" preserveAspectRatio="none">
        <!-- Grid -->
        <line class="g-line" x1="0" y1="0" x2="800" y2="0"/>
        <line class="g-line" x1="0" y1="80" x2="800" y2="80"/>
        <line class="g-line" x1="0" y1="160" x2="800" y2="160"/>
        <line class="g-line" x1="0" y1="240" x2="800" y2="240"/>
        <line class="g-line" x1="0" y1="320" x2="800" y2="320"/>
        <line class="x-line" x1="0" y1="400" x2="800" y2="400"/>

        <!-- Blue ribbon -->
        <path class="band" fill="var(--blue)" d="
          M480,285 L513,282 L546,288 L580,280 L613,286 L646,278 L680,284 L713,276 L746,282
          L746,300 L713,306 L680,308 L646,302 L613,310 L580,306 L546,312 L513,308 L480,310 Z
        "/>
        <path class="med" stroke="var(--blue)" d="
          M480,294 L513,292 L546,298 L580,290 L613,296 L646,288 L680,294 L713,290 L746,292
        "/>

        <!-- Rose ribbon -->
        <path class="band" fill="var(--rose)" d="
          M480,120 L513,132 L546,114 L580,126 L613,108 L646,130 L680,116 L713,124 L746,112
          L746,172 L713,178 L680,182 L646,170 L613,180 L580,176 L546,184 L513,176 L480,180 Z
        "/>
        <path class="med" stroke="var(--rose)" d="
          M480,148 L513,156 L546,150 L580,152 L613,144 L646,152 L680,148 L713,152 L746,142
        "/>

        <!-- Blue dots -->
        <circle class="dot" fill="var(--blue)" cx="33" cy="296" data-t="google.com|R1|39ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="66" cy="304" data-t="google.com|R2|41ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="100" cy="288" data-t="google.com|R3|36ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="133" cy="296" data-t="google.com|R4|38ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="166" cy="306" data-t="google.com|R5|40ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="200" cy="286" data-t="google.com|R6|35ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="233" cy="294" data-t="google.com|R7|37ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="266" cy="310" data-t="google.com|R8|42ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="300" cy="292" data-t="google.com|R9|37ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="333" cy="302" data-t="google.com|R10|40ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="366" cy="284" data-t="google.com|R11|34ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="400" cy="298" data-t="google.com|R12|39ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="433" cy="290" data-t="google.com|R13|36ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="466" cy="306" data-t="google.com|R14|41ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="500" cy="292" data-t="google.com|R15|37ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="533" cy="288" data-t="google.com|R16|35ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="566" cy="302" data-t="google.com|R17|40ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="600" cy="284" data-t="google.com|R18|34ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="633" cy="296" data-t="google.com|R19|38ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="666" cy="290" data-t="google.com|R20|36ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="700" cy="294" data-t="google.com|R21|37ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="733" cy="288" data-t="google.com|R22|35ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="766" cy="292" data-t="google.com|R23|37ms|var(--blue)"/>
        <circle class="dot" fill="var(--blue)" cx="800" cy="296" data-t="google.com|R24|38ms|var(--blue)"/>

        <!-- Rose dots -->
        <circle class="dot" fill="var(--rose)" cx="33" cy="156" data-t="1.1.1.1|R1|92ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="66" cy="140" data-t="1.1.1.1|R2|98ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="100" cy="168" data-t="1.1.1.1|R3|87ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="133" cy="120" data-t="1.1.1.1|R4|105ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="166" cy="152" data-t="1.1.1.1|R5|93ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="200" cy="176" data-t="1.1.1.1|R6|84ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="233" cy="144" data-t="1.1.1.1|R7|96ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="266" cy="128" data-t="1.1.1.1|R8|102ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="300" cy="160" data-t="1.1.1.1|R9|90ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="333" cy="148" data-t="1.1.1.1|R10|95ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="366" cy="136" data-t="1.1.1.1|R11|99ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="400" cy="164" data-t="1.1.1.1|R12|88ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="433" cy="80" data-t="1.1.1.1|R13|120ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="466" cy="152" data-t="1.1.1.1|R14|93ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="500" cy="140" data-t="1.1.1.1|R15|97ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="533" cy="156" data-t="1.1.1.1|R16|92ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="566" cy="128" data-t="1.1.1.1|R17|102ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="600" cy="144" data-t="1.1.1.1|R18|96ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="633" cy="160" data-t="1.1.1.1|R19|90ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="666" cy="132" data-t="1.1.1.1|R20|100ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="700" cy="148" data-t="1.1.1.1|R21|95ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="733" cy="156" data-t="1.1.1.1|R22|92ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="766" cy="124" data-t="1.1.1.1|R23|104ms|var(--rose)"/>
        <circle class="dot" fill="var(--rose)" cx="800" cy="140" data-t="1.1.1.1|R24|98ms|var(--rose)"/>

    <div class="x-row">
      <span class="x-tick">1</span>
      <span class="x-tick">5</span>

    <!-- Tooltip -->
    <div class="tt" id="tt">
      <div class="tt-body">
        <div class="tt-color" id="tt-color"></div>
        <div class="tt-data">
          <div class="tt-endpoint" id="tt-ep"></div>
          <div class="tt-latency" id="tt-lat"></div>
          <div class="tt-round" id="tt-round"></div>

  <!-- Bottom Stats -->
  <div class="bottom-stats">
    <div class="bs-section">
      <div class="bs-color" style="background: var(--blue)"></div>
      <div class="bs-name">google.com</div>
      <div class="bs-metrics">
        <div class="bs-m"><div class="bs-m-label">P50</div><div class="bs-m-val">38<span class="u">ms</span></div></div>
        <div class="bs-m"><div class="bs-m-label">P95</div><div class="bs-m-val">52<span class="u">ms</span></div></div>
        <div class="bs-m"><div class="bs-m-label">P99</div><div class="bs-m-val">98<span class="u">ms</span></div></div>
        <div class="bs-m"><div class="bs-m-label">Jitter</div><div class="bs-m-val">4.2<span class="u">ms</span></div></div>

      <div class="bs-color" style="background: var(--rose)"></div>
      <div class="bs-name">1.1.1.1</div>
      <div class="bs-metrics">
        <div class="bs-m"><div class="bs-m-label">P50</div><div class="bs-m-val">94<span class="u">ms</span></div></div>
        <div class="bs-m"><div class="bs-m-label">P95</div><div class="bs-m-val">128<span class="u">ms</span></div></div>
        <div class="bs-m"><div class="bs-m-label">P99</div><div class="bs-m-val">167<span class="u">ms</span></div></div>
        <div class="bs-m"><div class="bs-m-label">Jitter</div><div class="bs-m-val">6.1<span class="u">ms</span></div></div>
        <div class="bs-m"><div class="bs-m-label">Loss</div><div class="bs-m-val">0<span class="u">%</span></div></div>
      </div>
    </div>
  </div>
</div>

<script>
  const tt = document.getElementById('tt');
  const ttEp = document.getElementById('tt-ep');
  const ttLat = document.getElementById('tt-lat');
  const ttRound = document.getElementById('tt-round');
  const ttColor = document.getElementById('tt-color');
  const chart = document.getElementById('chart');

  document.querySelectorAll('.dot').forEach(d => {
    d.addEventListener('mouseenter', () => {
      const raw = d.getAttribute('data-t');
      if (!raw) return;
      const [name, round, lat, color] = raw.split('|');
      ttEp.textContent = name;
      ttLat.textContent = lat;
      ttRound.textContent = round;
      ttColor.style.background = color;

      const cRect = chart.getBoundingClientRect();
      const svgArea = chart.querySelector('.svg-area');
      const sRect = svgArea.getBoundingClientRect();
      const cx = parseFloat(d.getAttribute('cx'));
      const cy = parseFloat(d.getAttribute('cy'));

      const px = sRect.left - cRect.left + (cx / 800) * sRect.width;
      const py = sRect.top - cRect.top + (cy / 400) * sRect.height;

      tt.style.left = px + 'px';
      tt.style.top = py + 'px';
      tt.classList.add('show');
    });
    d.addEventListener('mouseleave', () => tt.classList.remove('show'));
  });
</script>
</body>
</html>
