<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde — Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inconsolata:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b0e;--surface:#111116;--raised:#1a1a21;
  --b1:rgba(255,255,255,.05);--b2:rgba(255,255,255,.1);
  --t1:#f5f5f5;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.22);
  --c1:#2dd4bf;--c2:#f59e0b;
  --green:#4ade80;--red:#f87171;
  --sans:'Manrope',system-ui,sans-serif;
  --mono:'Inconsolata',monospace;
}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top */
.top{height:40px;display:flex;align-items:center;padding:0 20px;gap:12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.logo{font-weight:800;font-size:14px;letter-spacing:-.02em}
.run{font-family:var(--mono);font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
.run .d{width:5px;height:5px;border-radius:50%;background:var(--green);animation:p 1.5s ease-in-out infinite}
@keyframes p{50%{opacity:.3}}
.sp{flex:1}
.btn{font-size:11px;font-weight:600;padding:4px 12px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer}
.btn:hover{color:var(--t1)}
.btn-r{color:var(--red);border-color:rgba(248,113,113,.2)}

/* Main */
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);overflow:hidden}

/* Endpoint Column */
.col{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.col-head{padding:16px 20px 8px;flex-shrink:0}
.col-url{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:.01em}
.col-now{display:flex;align-items:baseline;gap:6px;margin-top:4px}
.col-val{font-size:72px;font-weight:300;letter-spacing:-.06em;line-height:1}
.col-unit{font-size:20px;font-weight:400;color:var(--t3)}
.col-label{font-size:11px;color:var(--t3);margin-top:2px}

/* Stats strip */
.col-stats{display:flex;gap:16px;padding:8px 20px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.cs{font-family:var(--mono);font-size:11px}
.cs em{font-style:normal;color:var(--t3);font-size:10px}
.cs span{color:var(--t2)}

/* History strip — scrolling recent values */
.history{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.history-label{font-family:var(--mono);font-size:9px;color:var(--t3);padding:8px 20px 4px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}

/* Value cascade */
.cascade{flex:1;display:flex;flex-direction:column-reverse;padding:0 20px 8px;gap:1px;overflow:hidden}
.cascade-row{display:flex;align-items:center;gap:10px;padding:3px 0;transition:opacity .2s}
.cascade-round{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:28px}
.cascade-bar{height:4px;border-radius:2px;transition:width .2s}
.cascade-val{font-family:var(--mono);font-size:12px;min-width:48px}

/* Sparkline at bottom */
.spark{height:64px;border-top:1px solid var(--b1);flex-shrink:0;padding:6px 20px}
.spark svg{width:100%;height:100%}

/* Footer */
.foot{height:28px;display:flex;align-items:center;padding:0 20px;border-top:1px solid var(--b1);font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0;gap:12px}
.foot .sp{flex:1}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════════
     CONCEPT H: PULSE

     The latest measurement dominates — 72px, colored, impossible to miss.
     Below it, a cascading history of values scrolls down, each with a
     proportional bar. The most recent is brightest; older values fade.

     Split-screen: each endpoint gets half the viewport.
     You see what's happening RIGHT NOW + recent trend at a glance.

     A compact sparkline at the bottom gives the full time series view
     if you want it, but the cascade IS the primary visualization.

     This is what "real-time" should feel like. Not a chart that updates.
     A live readout that breathes.
     ════════════════════════════════════════════════════════════════════ -->

<div class="top">
  <div class="logo">Sonde</div>
  <div class="run"><div class="d"></div>R24/30</div>
  <div class="sp"></div>
  <button class="btn">Share</button>
  <button class="btn btn-r">Stop</button>
</div>

<div class="main">
  <!-- Column 1: Google -->
  <div class="col">
    <div class="col-head">
      <div class="col-url">www.google.com</div>
      <div class="col-now">
        <div class="col-val" style="color:var(--c1)">38</div>
        <div class="col-unit">ms</div>
      </div>
      <div class="col-label">latest · round 24</div>
    </div>
    <div class="col-stats">
      <div class="cs"><em>P50 </em><span>38ms</span></div>
      <div class="cs"><em>P95 </em><span>52ms</span></div>
      <div class="cs"><em>P99 </em><span>98ms</span></div>
      <div class="cs"><em>Jitter </em><span>4.2ms</span></div>
    </div>
    <div class="history">
      <div class="history-label">Recent measurements</div>
      <div class="cascade" id="cascade-1"></div>
    </div>
    <div class="spark">
      <svg viewBox="0 0 400 50" preserveAspectRatio="none">
        <path d="M0,24 L17,28 L33,20 L50,24 L67,30 L83,18 L100,22 L117,34 L133,20 L150,26 L167,16 L183,24 L200,20 L217,30 L233,22 L250,18 L267,26 L283,14 L300,22 L317,20 L333,22 L350,18 L367,20 L383,22 L400,24" fill="none" stroke="var(--c1)" stroke-width="1.5" opacity=".4"/>
        <path d="M0,24 L17,28 L33,20 L50,24 L67,30 L83,18 L100,22 L117,34 L133,20 L150,26 L167,16 L183,24 L200,20 L217,30 L233,22 L250,18 L267,26 L283,14 L300,22 L317,20 L333,22 L350,18 L367,20 L383,22 L400,24 L400,50 L0,50 Z" fill="url(#g1)" opacity=".2"/>
        <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--c1)"/><stop offset="1" stop-color="transparent"/></linearGradient></defs>
      </svg>
    </div>
  </div>

  <!-- Column 2: Cloudflare -->
  <div class="col">
    <div class="col-head">
      <div class="col-url">1.1.1.1</div>
      <div class="col-now">
        <div class="col-val" style="color:var(--c2)">98</div>
        <div class="col-unit">ms</div>
      </div>
      <div class="col-label">latest · round 24</div>
    </div>
    <div class="col-stats">
      <div class="cs"><em>P50 </em><span>94ms</span></div>
      <div class="cs"><em>P95 </em><span>128ms</span></div>
      <div class="cs"><em>P99 </em><span>167ms</span></div>
      <div class="cs"><em>Jitter </em><span>6.1ms</span></div>
    </div>
    <div class="history">
      <div class="history-label">Recent measurements</div>
      <div class="cascade" id="cascade-2"></div>
    </div>
    <div class="spark">
      <svg viewBox="0 0 400 50" preserveAspectRatio="none">
        <path d="M0,26 L17,20 L33,30 L50,12 L67,24 L83,34 L100,20 L117,14 L133,28 L150,22 L167,16 L183,32 L200,6 L217,24 L233,20 L250,26 L267,14 L283,22 L300,28 L317,16 L333,24 L350,26 L367,10 L383,20 L400,18" fill="none" stroke="var(--c2)" stroke-width="1.5" opacity=".4"/>
        <path d="M0,26 L17,20 L33,30 L50,12 L67,24 L83,34 L100,20 L117,14 L133,28 L150,22 L167,16 L183,32 L200,6 L217,24 L233,20 L250,26 L267,14 L283,22 L300,28 L317,16 L333,24 L350,26 L367,10 L383,20 L400,18 L400,50 L0,50 Z" fill="url(#g2)" opacity=".2"/>
        <defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--c2)"/><stop offset="1" stop-color="transparent"/></linearGradient></defs>
      </svg>
    </div>
  </div>
</div>

<div class="foot">
  From your browser<div class="sp"></div>1s · 5s timeout<div class="sp"></div>24/30
</div>

<script>
const g = [39,41,36,38,40,35,37,42,37,40,34,39,36,41,37,35,40,34,38,36,37,35,37,38];
const c = [92,98,87,105,93,84,96,102,90,95,99,88,120,93,97,92,102,96,90,100,95,92,104,98];
const maxG = 55;
const maxC = 140;

function buildCascade(id, data, max, color) {
  const el = document.getElementById(id);
  const reversed = data.slice().reverse();
  reversed.forEach(function(val, i) {
    const row = document.createElement('div');
    row.className = 'cascade-row';
    row.style.opacity = String(Math.max(0.2, 1 - i * 0.04));

    const roundEl = document.createElement('span');
    roundEl.className = 'cascade-round';
    roundEl.textContent = 'R' + (data.length - i);
    row.appendChild(roundEl);

    const bar = document.createElement('div');
    bar.className = 'cascade-bar';
    bar.style.width = Math.min((val / max) * 100, 100) + '%';
    bar.style.background = color;
    bar.style.opacity = String(Math.max(0.15, 0.5 - i * 0.02));
    row.appendChild(bar);

    const valEl = document.createElement('span');
    valEl.className = 'cascade-val';
    valEl.style.color = color;
    valEl.style.opacity = String(Math.max(0.4, 1 - i * 0.03));
    valEl.textContent = val + 'ms';
    row.appendChild(valEl);

    el.appendChild(row);
  });
}

buildCascade('cascade-1', g, maxG, 'var(--c1)');
buildCascade('cascade-2', c, maxC, 'var(--c2)');
</script>
</body>
</html>
