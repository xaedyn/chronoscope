<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde — Lanes</title>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050506;--lane:#0a0b0d;--lane-alt:#08090b;
  --b1:rgba(255,255,255,.04);--b2:rgba(255,255,255,.08);
  --t1:#ededed;--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.2);
  --c1:#5eead4;--c2:#f97316;--c3:#818cf8;
  --green:#4ade80;--red:#f87171;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'Azeret Mono',monospace;
}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Top ────────────────────── */
.top{height:44px;display:flex;align-items:center;padding:0 20px;gap:14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.logo{font-weight:700;font-size:15px;letter-spacing:-.02em}
.sep{width:1px;height:14px;background:var(--b2)}
.run{font-family:var(--mono);font-size:11px;color:var(--t2);display:flex;align-items:center;gap:6px}
.run .d{width:6px;height:6px;border-radius:50%;background:var(--green);animation:p 1.5s ease-in-out infinite}
@keyframes p{50%{opacity:.3}}
.sp{flex:1}
.btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer}
.btn:hover{color:var(--t1);background:rgba(255,255,255,.03)}
.btn-r{color:var(--red);border-color:rgba(248,113,113,.2)}

/* ── Lanes Container ───────── */
.lanes{flex:1;display:flex;flex-direction:column;overflow:auto}

/* ── Single Lane ───────────── */
.lane{display:grid;grid-template-columns:200px 1fr;min-height:0;flex:1;border-bottom:1px solid var(--b1)}
.lane:nth-child(odd){background:var(--lane)}
.lane:nth-child(even){background:var(--lane-alt)}

/* Lane sidebar */
.lane-info{padding:16px 20px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--b1)}
.lane-url{font-family:var(--mono);font-size:11px;color:var(--t3);margin-bottom:4px}
.lane-hero{display:flex;align-items:baseline;gap:3px}
.lane-val{font-size:36px;font-weight:300;letter-spacing:-.05em;line-height:1}
.lane-unit{font-size:13px;color:var(--t3)}
.lane-sub{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:6px}
.lane-stats{display:flex;gap:12px;margin-top:8px}
.lane-s{font-family:var(--mono);font-size:10px}
.lane-s em{font-style:normal;color:var(--t3)}
.lane-s span{color:var(--t2)}

/* Lane chart */
.lane-chart{position:relative;padding:8px 12px 8px 0;overflow:hidden}
.lane-chart svg{width:100%;height:100%}

/* Y markers inside lane */
.lane-y{position:absolute;right:12px;font-family:var(--mono);font-size:9px;color:var(--t3);opacity:.5}
.lane-y.hi{top:8px}
.lane-y.lo{bottom:8px}
.lane-y.mid{top:50%;transform:translateY(-50%)}

/* ── Shared X-axis ─────────── */
.x-bar{height:24px;display:grid;grid-template-columns:200px 1fr;border-top:1px solid var(--b1);flex-shrink:0}
.x-bar-spacer{border-right:1px solid var(--b1)}
.x-bar-labels{display:flex;justify-content:space-between;align-items:center;padding:0 12px 0 0;font-family:var(--mono);font-size:10px;color:var(--t3)}

/* ── Footer ────────────────── */
.foot{height:28px;display:flex;align-items:center;padding:0 20px;font-family:var(--mono);font-size:10px;color:var(--t3);border-top:1px solid var(--b1);flex-shrink:0;gap:16px}
.foot .sp{flex:1}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════════
     CONCEPT F: LANES

     Each endpoint gets a horizontal lane — like swim lanes in a pool
     or traces in a profiler. Each lane has its own Y-axis scaled to
     that endpoint's range.

     Why this works: you see each endpoint's CHARACTER independently.
     Google's lane is tight and flat (stable). 1.1.1.1's lane is
     choppy (variable). You don't need a shared Y-axis to compare —
     the visual texture tells the story.

     The left sidebar shows the hero number and key stats.
     Lanes stack vertically. Add an endpoint, get another lane.
     ════════════════════════════════════════════════════════════════════ -->

<div class="top">
  <div class="logo">Sonde</div>
  <div class="sep"></div>
  <div class="run"><div class="d"></div>Running · R24/30</div>
  <div class="sp"></div>
  <button class="btn">+ Endpoint</button>
  <button class="btn">Share</button>
  <button class="btn btn-r">Stop</button>
</div>

      <svg viewBox="0 0 800 120" preserveAspectRatio="none">

        <circle cx="100" cy="48" r="2.5" fill="var(--c1)" opacity=".8"/>
        <circle cx="133" cy="56" r="2.5" fill="var(--c1)" opacity=".8"/>
        <circle cx="167" cy="68" r="2.5" fill="var(--c1)" opacity=".8"/>

        <circle cx="333" cy="62" r="2.5" fill="var(--c1)" opacity=".8"/>

        <circle cx="467" cy="66" r="2.5" fill="var(--c1)" opacity=".8"/>

        <circle cx="700" cy="54" r="2.5" fill="var(--c1)" opacity=".8"/>

        <circle cx="800" cy="56" r="2.5" fill="var(--c1)" opacity=".8"/>
      </svg>
    </div>
  </div>

  <!-- Lane 2: 1.1.1.1 -->
  <div class="lane">
    <div class="lane-info">
      <div class="lane-url">1.1.1.1</div>
      <div class="lane-hero">
        <div class="lane-val" style="color:var(--c2)">94</div>

        <div class="lane-s"><em>P95</em> <span>128ms</span></div>

    <div class="lane-chart">

      <div class="lane-y lo">78ms</div>

        <!-- P25-P75 ribbon — wider spread -->

        <path fill="none" stroke="rgba(249,115,22,.3)" stroke-width="1.5" stroke-dasharray="4 4" d="
          M480,58 L513,66 L547,60 L580,62 L613,54 L647,66 L680,58 L713,62 L747,56 L780,48"/>

        <circle cx="333" cy="44" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="367" cy="34" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="400" cy="60" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="433" cy="8" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="467" cy="48" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="500" cy="38" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="533" cy="52" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="567" cy="28" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="600" cy="40" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="633" cy="56" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="667" cy="30" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="700" cy="44" r="2.5" fill="var(--c2)" opacity=".8"/>
        <circle cx="733" cy="52" r="2.5" fill="var(--c2)" opacity=".8"/>

        <circle cx="800" cy="38" r="2.5" fill="var(--c2)" opacity=".8"/>
      </svg>
    </div>
  </div>
</div>

<!-- Shared X-axis -->
<div class="x-bar">
  <div class="x-bar-spacer"></div>
  <div class="x-bar-labels">
    <span>1</span><span>5</span><span>10</span><span>15</span><span>20</span><span>24</span>

</div>

<div class="foot">

</div>
</body>
</html>
