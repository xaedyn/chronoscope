<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde Design Concepts v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  .tabs {
    display: flex;
    background: #0a0a0a;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
    z-index: 10;
  }
  .tab {
    padding: 12px 24px;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.12s;
    user-select: none;
    white-space: nowrap;
    font-weight: 500;
  }
  .tab:hover { color: #aaa; }
  .tab.active { color: #fff; border-bottom-color: #fff; }
  .tab .num { font-weight: 700; margin-right: 6px; font-size: 11px; opacity: 0.4; }
  iframe { flex: 1; width: 100%; border: none; }
</style>
</head>
<body>
<div class="tabs">
  <div class="tab active" onclick="show(this,'v3-glass.html')"><span class="num">00</span>Glass v2</div>
  <div class="tab" onclick="show(this,'v2-swiss.html')"><span class="num">01</span>Swiss</div>
  <div class="tab" onclick="show(this,'v2-midnight.html')"><span class="num">02</span>Midnight</div>
  <div class="tab" onclick="show(this,'v2-neon.html')"><span class="num">03</span>Neon</div>
  <div class="tab" onclick="show(this,'v2-paper.html')"><span class="num">04</span>Paper</div>
  <div class="tab" onclick="show(this,'v2-glass.html')"><span class="num">05</span>Glass</div>
</div>
<iframe id="frame" src="v3-glass.html"></iframe>
<script>
  function show(el, src) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('frame').src = src;
  }
</script>
</body>
</html>
