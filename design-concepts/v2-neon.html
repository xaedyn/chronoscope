<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde — Neon</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Victor+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--surface:#060608;--panel:#0a0a0e;
  --b1:rgba(0,255,204,.06);--b2:rgba(0,255,204,.12);--b3:rgba(0,255,204,.25);
  --neon:#00ffcc;--neon-50:rgba(0,255,204,.5);--neon-20:rgba(0,255,204,.2);--neon-08:rgba(0,255,204,.08);--neon-04:rgba(0,255,204,.04);
  --warm:#ff6b4a;--warm-20:rgba(255,107,74,.2);--warm-08:rgba(255,107,74,.08);
  --t1:#e0ffe8;--t2:rgba(224,255,232,.5);--t3:rgba(224,255,232,.2);--t4:rgba(224,255,232,.08);
  --display:'Chakra Petch',sans-serif;
  --mono:'Victor Mono',monospace;
}
body{background:var(--bg);color:var(--t1);font-family:var(--display);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* Scanline effect */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* ── Top ── */
.top{height:48px;display:flex;align-items:center;padding:0 24px;gap:16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.logo{font-weight:700;font-size:18px;letter-spacing:.15em;text-transform:uppercase;color:var(--neon);text-shadow:0 0 20px var(--neon-50),0 0 40px rgba(0,255,204,.15)}
.top-sep{width:1px;height:18px;background:var(--b2)}
.run{font-family:var(--mono);font-size:12px;color:var(--neon-50);display:flex;align-items:center;gap:8px}
.run .d{width:6px;height:6px;background:var(--neon);box-shadow:0 0 8px var(--neon-50);animation:fl 1s step-end infinite}
@keyframes fl{50%{opacity:.15}}
.sp{flex:1}
.btn{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;transition:.12s;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}
.btn:hover{border-color:var(--neon);color:var(--neon);background:var(--neon-04)}
.btn-n{border-color:var(--neon);color:var(--neon)}
.btn-n:hover{background:var(--neon-08);box-shadow:0 0 12px var(--neon-08)}

/* ── Lanes ── */
.lanes{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Lane ── */
.lane{flex:1;display:flex;border-bottom:1px solid var(--b1);min-height:0;position:relative}
.lane::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;z-index:3}
.lane:nth-child(1)::before{background:var(--neon);box-shadow:0 0 8px var(--neon-50)}
.lane:nth-child(2)::before{background:var(--warm);box-shadow:0 0 8px rgba(255,107,74,.5)}

.lane-panel{
  width:220px;flex-shrink:0;padding:20px 24px 20px 20px;
  display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid var(--b1);
  background:var(--panel);
}
.lane-url{font-family:var(--mono);font-size:11px;color:var(--t3);font-style:italic}
.lane-hero{font-size:56px;font-weight:300;letter-spacing:-.04em;line-height:.85;margin-top:6px}
.hero-neon{color:var(--neon);text-shadow:0 0 20px var(--neon-20)}
.hero-warm{color:var(--warm);text-shadow:0 0 20px rgba(255,107,74,.2)}
.lane-hero .u{font-size:16px;font-weight:400;color:var(--t3);margin-left:2px;text-shadow:none}
.lane-sub{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
.lane-stats{display:flex;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid var(--b1)}
.ls-l{font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.ls-v{font-family:var(--mono);font-size:13px;color:var(--t2);margin-top:1px;font-weight:500}

.lane-chart{flex:1;position:relative;overflow:hidden;background:var(--surface)}
.lane-chart svg{width:100%;height:100%;display:block}
.lane-y{position:absolute;right:12px;font-family:var(--mono);font-size:10px;color:var(--t3);pointer-events:none}
.lane-y.t{top:8px}.lane-y.m{top:50%;transform:translateY(-50%)}.lane-y.b{bottom:8px}

/* X axis */
.x-bar{height:24px;display:flex;align-items:center;border-top:1px solid var(--b1);flex-shrink:0;background:var(--panel)}
.x-sp{width:220px;border-right:1px solid var(--b1);height:100%;display:flex;align-items:center;padding-left:20px}
.x-sp span{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.x-labels{flex:1;display:flex;justify-content:space-between;padding:0 14px;font-family:var(--mono);font-size:10px;color:var(--t3)}

/* Footer */
.foot{height:24px;display:flex;align-items:center;padding:0 24px;border-top:1px solid var(--b1);font-family:var(--mono);font-size:10px;color:var(--t3);gap:16px;flex-shrink:0}
.foot .sp{flex:1}
.foot .hl{color:var(--neon-50)}

/* SVG */
.g{stroke:var(--neon-04);stroke-width:.5}
.thr{stroke:var(--warm);stroke-width:1;stroke-dasharray:6 4;opacity:.2}
.thr-label{font-family:var(--mono);font-size:10px;fill:var(--warm);opacity:.3}
.ribbon{opacity:1}
.med{fill:none;stroke-width:1.5;stroke-dasharray:5 4;opacity:.35}
.ln{fill:none;stroke-width:1.5;opacity:.3}
.pt{r:2.5;opacity:.9;cursor:pointer;transition:r .06s}
.pt:hover{r:4.5;opacity:1}
.future{fill:rgba(0,255,204,.01)}
.now-neon{filter:drop-shadow(0 0 6px var(--neon-50))}
.now-warm{filter:drop-shadow(0 0 6px rgba(255,107,74,.5))}

/* Hover */
.xline{position:absolute;top:48px;bottom:48px;width:1px;background:var(--neon);pointer-events:none;z-index:5;opacity:0;transition:opacity .04s;box-shadow:0 0 6px var(--neon-20)}
.xline.v{opacity:.4}
</style>
</head>
<body>

<div class="top">
  <div class="logo">Sonde</div>
  <div class="top-sep"></div>
  <div class="run"><div class="d"></div>R24/30</div>
  <div class="sp"></div>
  <button class="btn">+ Endpoint</button>
  <button class="btn">Share</button>
  <button class="btn btn-n">Stop</button>
</div>

<div class="lanes" id="lanes">
  <div class="lane">
    <div class="lane-panel">
      <div class="lane-url">www.google.com</div>
      <div class="lane-hero hero-neon">38<span class="u">ms</span></div>
      <div class="lane-sub">P50 Median</div>
      <div class="lane-stats">
        <div><div class="ls-l">P95</div><div class="ls-v">52ms</div></div>
        <div><div class="ls-l">P99</div><div class="ls-v">98ms</div></div>
        <div><div class="ls-l">Jitter</div><div class="ls-v">4.2ms</div></div>
        <div><div class="ls-l">Loss</div><div class="ls-v">0%</div></div>
      </div>
    </div>
    <div class="lane-chart">
      <div class="lane-y t">52ms</div><div class="lane-y m">38ms</div><div class="lane-y b">28ms</div>
      <svg viewBox="0 0 1000 200" preserveAspectRatio="none">
        <line class="g" x1="0" y1="50" x2="1000" y2="50"/><line class="g" x1="0" y1="100" x2="1000" y2="100"/><line class="g" x1="0" y1="150" x2="1000" y2="150"/>
        <rect class="future" x="800" y="0" width="200" height="200"/>
        <path class="ribbon" fill="var(--neon-08)" d="M433,88 L467,84 L500,92 L533,82 L567,90 L600,80 L633,86 L667,78 L700,84 L733,80 L767,86 L767,126 L733,130 L700,132 L667,128 L633,134 L600,130 L567,136 L533,132 L500,128 L467,124 L433,128 Z"/>
        <path class="med" stroke="var(--neon)" d="M433,108 L467,104 L500,110 L533,104 L567,112 L600,106 L633,110 L667,102 L700,108 L733,106 L767,108"/>
        <path class="ln" stroke="var(--neon)" d="M0,110 L33,118 L67,102 L100,110 L133,122 L167,98 L200,106 L233,126 L267,104 L300,114 L333,94 L367,110 L400,102 L433,120 L467,106 L500,100 L533,116 L567,94 L600,108 L633,102 L667,104 L700,98 L733,104 L767,108 L800,110"/>
        <g fill="var(--neon)"><circle class="pt" cx="0" cy="110"/><circle class="pt" cx="33" cy="118"/><circle class="pt" cx="67" cy="102"/><circle class="pt" cx="100" cy="110"/><circle class="pt" cx="133" cy="122"/><circle class="pt" cx="167" cy="98"/><circle class="pt" cx="200" cy="106"/><circle class="pt" cx="233" cy="126"/><circle class="pt" cx="267" cy="104"/><circle class="pt" cx="300" cy="114"/><circle class="pt" cx="333" cy="94"/><circle class="pt" cx="367" cy="110"/><circle class="pt" cx="400" cy="102"/><circle class="pt" cx="433" cy="120"/><circle class="pt" cx="467" cy="106"/><circle class="pt" cx="500" cy="100"/><circle class="pt" cx="533" cy="116"/><circle class="pt" cx="567" cy="94"/><circle class="pt" cx="600" cy="108"/><circle class="pt" cx="633" cy="102"/><circle class="pt" cx="667" cy="104"/><circle class="pt" cx="700" cy="98"/><circle class="pt" cx="733" cy="104"/><circle class="pt" cx="767" cy="108"/></g>
        <circle class="now-neon" cx="800" cy="110" r="3.5" fill="var(--neon)"/>
      </svg>
    </div>
  </div>

  <div class="lane">
    <div class="lane-panel">
      <div class="lane-url">1.1.1.1</div>
      <div class="lane-hero hero-warm">94<span class="u">ms</span></div>
      <div class="lane-sub">P50 Median</div>
      <div class="lane-stats">
        <div><div class="ls-l">P95</div><div class="ls-v">128ms</div></div>
        <div><div class="ls-l">P99</div><div class="ls-v">167ms</div></div>
        <div><div class="ls-l">Jitter</div><div class="ls-v">6.1ms</div></div>
        <div><div class="ls-l">Loss</div><div class="ls-v">0%</div></div>
      </div>
    </div>
    <div class="lane-chart">
      <div class="lane-y t">142ms</div><div class="lane-y m">94ms</div><div class="lane-y b">78ms</div>
      <svg viewBox="0 0 1000 200" preserveAspectRatio="none">
        <line class="g" x1="0" y1="50" x2="1000" y2="50"/><line class="g" x1="0" y1="100" x2="1000" y2="100"/><line class="g" x1="0" y1="150" x2="1000" y2="150"/>
        <line class="thr" x1="0" y1="70" x2="800" y2="70"/><text class="thr-label" x="6" y="65">100ms</text>
        <rect class="future" x="800" y="0" width="200" height="200"/>
        <path class="ribbon" fill="var(--warm-08)" d="M433,36 L467,44 L500,30 L533,42 L567,24 L600,48 L633,32 L667,38 L700,28 L733,36 L767,26 L767,120 L733,126 L700,128 L667,122 L633,130 L600,124 L567,128 L533,122 L500,116 L467,112 L433,118 Z"/>
        <path class="med" stroke="var(--warm)" d="M433,78 L467,82 L500,74 L533,78 L567,70 L600,82 L633,76 L667,78 L700,72 L733,76 L767,68"/>
        <path class="ln" stroke="var(--warm)" d="M0,82 L33,66 L67,98 L100,50 L133,78 L167,106 L200,70 L233,58 L267,86 L300,74 L333,62 L367,90 L400,26 L433,78 L467,66 L500,82 L533,58 L567,70 L600,86 L633,58 L667,74 L700,82 L733,50 L767,66 L800,70"/>
        <g fill="var(--warm)"><circle class="pt" cx="0" cy="82"/><circle class="pt" cx="33" cy="66"/><circle class="pt" cx="67" cy="98"/><circle class="pt" cx="100" cy="50"/><circle class="pt" cx="133" cy="78"/><circle class="pt" cx="167" cy="106"/><circle class="pt" cx="200" cy="70"/><circle class="pt" cx="233" cy="58"/><circle class="pt" cx="267" cy="86"/><circle class="pt" cx="300" cy="74"/><circle class="pt" cx="333" cy="62"/><circle class="pt" cx="367" cy="90"/><circle class="pt" cx="400" cy="26"/><circle class="pt" cx="433" cy="78"/><circle class="pt" cx="467" cy="66"/><circle class="pt" cx="500" cy="82"/><circle class="pt" cx="533" cy="58"/><circle class="pt" cx="567" cy="70"/><circle class="pt" cx="600" cy="86"/><circle class="pt" cx="633" cy="58"/><circle class="pt" cx="667" cy="74"/><circle class="pt" cx="700" cy="82"/><circle class="pt" cx="733" cy="50"/><circle class="pt" cx="767" cy="66"/></g>
        <circle class="now-warm" cx="800" cy="70" r="3.5" fill="var(--warm)"/>
      </svg>
    </div>
  </div>
</div>

<div class="x-bar">
  <div class="x-sp"><span>Round</span></div>
  <div class="x-labels"><span>1</span><span>5</span><span>10</span><span>15</span><span>20</span><span>24</span><span style="opacity:.3">30</span></div>
</div>

<div class="foot">
  <span class="hl">FROM YOUR BROWSER</span>
  <span>1s interval · 5s timeout</span>
  <div class="sp"></div>
  <span>24/30 · 0 err · 0 timeout</span>
</div>

<div class="xline" id="xline"></div>
<script>
var lanes=document.getElementById('lanes'),xl=document.getElementById('xline');
lanes.addEventListener('mousemove',function(e){var r=lanes.getBoundingClientRect();if(e.clientX-r.left<220){xl.classList.remove('v');return}xl.style.left=e.clientX+'px';xl.classList.add('v')});
lanes.addEventListener('mouseleave',function(){xl.classList.remove('v')});
</script>
</body>
</html>
