<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonde — Table</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f7f5;--white:#fff;--card:#fff;
  --b1:#eae8e4;--b2:#ddd;
  --t1:#111;--t2:#555;--t3:#999;
  --teal:#0d9488;--teal-bg:#f0fdfa;--teal-light:#ccfbf1;
  --orange:#c2410c;--orange-bg:#fff7ed;--orange-light:#ffedd5;
  --green-bg:#dcfce7;--green-t:#166534;
  --yellow-bg:#fef9c3;--yellow-t:#854d0e;
  --red-bg:#fee2e2;--red-t:#991b1b;
  --sans:'Inter Tight',system-ui,sans-serif;
  --mono:'Fira Code',monospace;
}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh}

.hdr{display:flex;align-items:center;padding:16px 24px;gap:16px}
.logo{font-weight:700;font-size:18px;letter-spacing:-.03em}
.sub{font-size:12px;color:var(--t3)}
.sp{flex:1}
.badge{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:6px;background:var(--green-bg);color:var(--green-t)}
.btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;border:1px solid var(--b2);background:var(--white);color:var(--t1);cursor:pointer}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--t1);color:var(--white);border-color:var(--t1)}

.summary{display:flex;gap:16px;padding:0 24px 16px;flex-wrap:wrap}
.sum-card{flex:1;min-width:200px;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.sum-bar{width:3px;height:40px;border-radius:2px}
.sum-data{}
.sum-url{font-family:var(--mono);font-size:11px;color:var(--t3)}
.sum-val{font-size:28px;font-weight:300;letter-spacing:-.04em;line-height:1.1}
.sum-val .u{font-size:12px;color:var(--t3)}
.sum-right{margin-left:auto;display:flex;gap:14px}
.sum-m{text-align:right}
.sum-m-l{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
.sum-m-v{font-family:var(--mono);font-size:13px;color:var(--t2)}

.table-wrap{padding:0 24px 24px}
.table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid var(--b1);border-radius:10px;overflow:hidden}
.table thead th{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);padding:10px 12px;text-align:left;border-bottom:1px solid var(--b1);background:var(--bg);position:sticky;top:0;z-index:2}
.table tbody td{font-family:var(--mono);font-size:12px;padding:6px 12px;border-bottom:1px solid rgba(0,0,0,.03);vertical-align:middle}
.table tbody tr:last-child td{border-bottom:none}
.table tbody tr:hover{background:rgba(0,0,0,.015)}
.round-num{color:var(--t3);font-size:11px}
.latency-cell{display:flex;align-items:center;gap:8px}
.lat-bar{height:6px;border-radius:3px;min-width:2px}
.lat-val{font-size:12px;min-width:48px}
.lat-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;letter-spacing:.02em}
.tag-fast{background:var(--green-bg);color:var(--green-t)}
.tag-mid{background:var(--yellow-bg);color:var(--yellow-t)}
.tag-slow{background:var(--red-bg);color:var(--red-t)}
.delta{font-size:11px;color:var(--t3)}
.delta-pos{color:var(--orange)}
.delta-neg{color:var(--teal)}
.table-scroll{max-height:calc(100vh - 260px);overflow-y:auto;border-radius:10px}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════════
     CONCEPT G: TABLE
     No chart. Live data table. Each row = round, each column = endpoint.
     Bars + color tags make it visual without a chart. Light theme.
     ════════════════════════════════════════════════════════════════════ -->

<div class="hdr">
  <div class="logo">Sonde</div>
  <div class="sub">HTTP Latency Diagnostic</div>
  <div class="sp"></div>
  <div class="badge">Running · Round 24/30</div>
  <div style="width:8px"></div>
  <button class="btn">Share</button>
  <button class="btn btn-p">Stop</button>
</div>

<div class="summary">
  <div class="sum-card">
    <div class="sum-bar" style="background:var(--teal)"></div>
    <div class="sum-data">
      <div class="sum-url">www.google.com</div>
      <div class="sum-val" style="color:var(--teal)">38<span class="u">ms</span></div>
    </div>
    <div class="sum-right">
      <div class="sum-m"><div class="sum-m-l">P95</div><div class="sum-m-v">52ms</div></div>
      <div class="sum-m"><div class="sum-m-l">Jitter</div><div class="sum-m-v">4.2ms</div></div>
    </div>
  </div>
  <div class="sum-card">
    <div class="sum-bar" style="background:var(--orange)"></div>
    <div class="sum-data">
      <div class="sum-url">1.1.1.1</div>
      <div class="sum-val" style="color:var(--orange)">94<span class="u">ms</span></div>
    </div>
    <div class="sum-right">
      <div class="sum-m"><div class="sum-m-l">P95</div><div class="sum-m-v">128ms</div></div>
      <div class="sum-m"><div class="sum-m-l">Jitter</div><div class="sum-m-v">6.1ms</div></div>
    </div>
  </div>
</div>

<div class="table-wrap">
<div class="table-scroll">
<table class="table">
<thead>
<tr>
  <th style="width:60px">Round</th>
  <th>www.google.com</th>
  <th style="width:50px"></th>
  <th>1.1.1.1</th>
  <th style="width:50px"></th>
  <th style="width:60px">Delta</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<script>
const data = [
  [39,92],[41,98],[36,87],[38,105],[40,93],[35,84],[37,96],[42,102],[37,90],[40,95],
  [34,99],[39,88],[36,120],[41,93],[37,97],[35,92],[40,102],[34,96],[38,90],[36,100],
  [37,95],[35,92],[37,104],[38,98]
];
const maxLat = 150;
const tbody = document.getElementById('tbody');

function tagClass(ms) {
  if (ms < 50) return 'tag-fast';
  if (ms < 100) return 'tag-mid';
  return 'tag-slow';
}
function tagText(ms) {
  if (ms < 50) return 'fast';
  if (ms < 100) return 'mid';
  return 'slow';
}

data.forEach(function(pair, i) {
  const g = pair[0];
  const c = pair[1];
  const gPct = Math.min((g / maxLat) * 100, 100);
  const cPct = Math.min((c / maxLat) * 100, 100);
  const d = c - g;

  const tr = document.createElement('tr');

  // Round
  const tdRound = document.createElement('td');
  const roundSpan = document.createElement('span');
  roundSpan.className = 'round-num';
  roundSpan.textContent = String(i + 1);
  tdRound.appendChild(roundSpan);
  tr.appendChild(tdRound);

  // Google latency
  const tdG = document.createElement('td');
  const gCell = document.createElement('div');
  gCell.className = 'latency-cell';
  const gBar = document.createElement('div');
  gBar.className = 'lat-bar';
  gBar.style.width = gPct + '%';
  gBar.style.background = 'var(--teal-light)';
  const gVal = document.createElement('span');
  gVal.className = 'lat-val';
  gVal.style.color = 'var(--teal)';
  gVal.textContent = g + 'ms';
  gCell.appendChild(gBar);
  gCell.appendChild(gVal);
  tdG.appendChild(gCell);
  tr.appendChild(tdG);

  // Google tag
  const tdGTag = document.createElement('td');
  const gTag = document.createElement('span');
  gTag.className = 'lat-tag ' + tagClass(g);
  gTag.textContent = tagText(g);
  tdGTag.appendChild(gTag);
  tr.appendChild(tdGTag);

  // Cloudflare latency
  const tdC = document.createElement('td');
  const cCell = document.createElement('div');
  cCell.className = 'latency-cell';
  const cBar = document.createElement('div');
  cBar.className = 'lat-bar';
  cBar.style.width = cPct + '%';
  cBar.style.background = 'var(--orange-light)';
  const cVal = document.createElement('span');
  cVal.className = 'lat-val';
  cVal.style.color = 'var(--orange)';
  cVal.textContent = c + 'ms';
  cCell.appendChild(cBar);
  cCell.appendChild(cVal);
  tdC.appendChild(cCell);
  tr.appendChild(tdC);

  // Cloudflare tag
  const tdCTag = document.createElement('td');
  const cTag = document.createElement('span');
  cTag.className = 'lat-tag ' + tagClass(c);
  cTag.textContent = tagText(c);
  tdCTag.appendChild(cTag);
  tr.appendChild(tdCTag);

  // Delta
  const tdDelta = document.createElement('td');
  const deltaSpan = document.createElement('span');
  deltaSpan.className = 'delta' + (d > 0 ? ' delta-pos' : d < 0 ? ' delta-neg' : '');
  deltaSpan.textContent = (d > 0 ? '+' : '') + d + 'ms';
  tdDelta.appendChild(deltaSpan);
  tr.appendChild(tdDelta);

  tbody.appendChild(tr);
});
</script>
</body>
</html>
